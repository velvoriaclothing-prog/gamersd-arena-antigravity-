<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMERS ARENA | Premium Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="cinematic.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-container" id="ga-logo">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/50/000/fff?text=GA'">
            <div>
                <div class="logo-text">GAMERS ARENA</div>
                <span class="logo-sub">PC GAMES ACCOUNTS STORE</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="library.html">FREE DROPS</a>
            <a href="premium.html" style="color: var(--accent-blue);">PREMIUM STORE</a>
        </div>
    </nav>

    <div class="section" style="padding-top: 12rem;">
        <div class="section-header">
            <div class="section-subtitle">Exclusive Access</div>
            <h1 class="section-title glowing-text" style="font-size: 4rem;">Personal Accounts of Premium Games</h1>
            <p style="color: var(--text-muted); font-size: 1.2rem; max-width: 600px; margin: 0 auto;">Secure, permanent access to the highest tier of PC gaming. Select a bundle below to proceed to checkout.</p>
        </div>

        <div class="grid" id="premium-grid">
            <!-- Dynamically loaded premium bundles -->
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        // Dummy premium bundles (Will be managed by Admin panel)
        const premiumBundles = [
            { id: 'b1', name: 'GTA V + RDR2 Ultimate', price: '$15.00', img: 'logo.png', desc: 'Full permanent access to Rockstar\'s best.' },
            { id: 'b2', name: 'Cyberpunk 2077 + DLC', price: '$12.50', img: 'logo.png', desc: 'Includes Phantom Liberty expansion.' },
            { id: 'b3', name: 'Elden Ring + Shadow of the Erdtree', price: '$18.00', img: 'logo.png', desc: 'GOTY Edition full access.' }
        ];

        const grid = document.getElementById('premium-grid');
        grid.innerHTML = premiumBundles.map(b => `
            <div class="card-3d" onclick="window.location.href='cart.html?bundle=${encodeURIComponent(b.name)}&price=${encodeURIComponent(b.price)}'">
                <div class="card-image-wrapper">
                    <img src="${b.img}" alt="${b.name}" onerror="this.src='logo.png'">
                </div>
                <div class="card-content">
                    <h3 class="card-title">${b.name}</h3>
                    <p class="card-desc">${b.desc}</p>
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                        <span class="card-price">${b.price}</span>
                        <span class="material-symbols-outlined" style="color: var(--accent-blue);">shopping_cart_checkout</span>
                    </div>
                </div>
            </div>
        `).join('');
    </script>
</body>
</html>
