<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gamers Arena | Login / Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <style>
        body { background-color: #050505; color: #e5e2e1; font-family: 'Inter', sans-serif; }
        .glass-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-input { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.15); color: white; transition: border-color 0.3s, box-shadow 0.3s; }
        .neon-input:focus { outline: none; border-color: #00f2ff; box-shadow: 0 0 10px rgba(0,242,255,0.3); }
        .neon-input::placeholder { color: rgba(255,255,255,0.3); }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
        .float-anim { animation: float 4s ease-in-out infinite; }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center relative overflow-hidden z-0">
    <script src="space-bg.js"></script>
    
    <div class="relative z-10 w-full max-w-md px-4">
        <!-- Logo -->
        <div class="text-center mb-8 float-anim">
            <h1 class="text-4xl font-black uppercase tracking-widest text-cyan-400 drop-shadow-[0_0_15px_rgba(0,242,255,0.6)]">Gamers Arena</h1>
            <p class="text-white/40 text-sm mt-1 tracking-widest">PLAY • COMPETE • WIN</p>
        </div>

        <!-- Tab Toggle -->
        <div class="glass-card rounded-xl p-1 flex mb-6">
            <button id="tab-login" onclick="switchTab('login')" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all bg-cyan-500 text-black">Sign In</button>
            <button id="tab-register" onclick="switchTab('register')" class="flex-1 py-2 rounded-lg font-bold text-sm transition-all text-white/60">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login-form" class="glass-card rounded-xl p-8 space-y-5">
            <h2 class="text-xl font-bold text-white">Welcome Back, Gamer</h2>
            <div id="login-error" class="hidden bg-red-900/30 border border-red-500/50 text-red-400 text-sm px-4 py-3 rounded-lg"></div>
            <div>
                <label class="text-xs text-white/50 uppercase tracking-widest mb-1 block">Email / Username</label>
                <input id="login-email" type="text" placeholder="your@email.com" class="neon-input w-full px-4 py-3 rounded-lg text-sm"/>
            </div>
            <div class="relative">
                <label class="text-xs text-white/50 uppercase tracking-widest mb-1 block">Password</label>
                <input id="login-pass" type="password" placeholder="••••••••" class="neon-input w-full px-4 py-3 rounded-lg text-sm pr-12"/>
                <span onclick="togglePass('login-pass')" class="material-symbols-outlined absolute right-4 top-9 text-white/30 cursor-pointer hover:text-cyan-400 text-lg">visibility</span>
            </div>
            <button onclick="doLogin()" id="login-btn" class="w-full bg-cyan-500 text-black font-bold py-3 rounded-lg hover:shadow-[0_0_20px_rgba(0,242,255,0.6)] transition-all text-sm">
                Sign In
            </button>
            
            <div class="relative flex items-center justify-center my-4">
                <div class="border-t border-white/10 w-full"></div>
                <span class="bg-[#050505] px-4 text-xs text-white/30 uppercase tracking-widest">Or</span>
                <div class="border-t border-white/10 w-full"></div>
            </div>

            <button onclick="loginWithGoogle()" class="w-full bg-white text-black font-bold py-3 rounded-lg flex items-center justify-center gap-3 hover:bg-white/90 transition-all text-sm">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" alt="G">
                Sign in with Google
            </button>

            <div class="text-center text-xs text-white/40">Admin? Use id: <span class="text-cyan-400">admin</span> with your admin password</div>
        </div>

        <!-- Register Form -->
        <div id="register-form" class="glass-card rounded-xl p-8 space-y-5 hidden">
            <h2 class="text-xl font-bold text-white">Join Gamers Arena</h2>
            <div id="reg-error" class="hidden bg-red-900/30 border border-red-500/50 text-red-400 text-sm px-4 py-3 rounded-lg"></div>
            <div id="reg-success" class="hidden bg-green-900/30 border border-green-500/50 text-green-400 text-sm px-4 py-3 rounded-lg"></div>
            <div>
                <label class="text-xs text-white/50 uppercase tracking-widest mb-1 block">Full Name</label>
                <input id="reg-name" type="text" placeholder="Your Gamer Name" class="neon-input w-full px-4 py-3 rounded-lg text-sm"/>
            </div>
            <div>
                <label class="text-xs text-white/50 uppercase tracking-widest mb-1 block">Email</label>
                <input id="reg-email" type="email" placeholder="your@email.com" class="neon-input w-full px-4 py-3 rounded-lg text-sm"/>
            </div>
            <div class="relative">
                <label class="text-xs text-white/50 uppercase tracking-widest mb-1 block">Password</label>
                <input id="reg-pass" type="password" placeholder="Min 6 characters" class="neon-input w-full px-4 py-3 rounded-lg text-sm pr-12"/>
                <span onclick="togglePass('reg-pass')" class="material-symbols-outlined absolute right-4 top-9 text-white/30 cursor-pointer hover:text-cyan-400 text-lg">visibility</span>
            </div>
            <button onclick="doRegister()" id="reg-btn" class="w-full bg-purple-600 text-white font-bold py-3 rounded-lg hover:shadow-[0_0_20px_rgba(182,0,248,0.5)] transition-all text-sm">
                Create Account
            </button>
        </div>

        <a href="/" class="block text-center text-white/30 text-xs mt-6 hover:text-cyan-400 transition-colors">
            ← Back to Store
        </a>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
    async function loginWithGoogle() {
        google.accounts.id.initialize({
            client_id: "475286815455-l335ndmjc1dn2cdbvg7n52v9dm5aslta.apps.googleusercontent.com",
            callback: handleCredentialResponse
        });
        google.accounts.id.prompt(); // also display the One Tap dialog
    }

    async function handleCredentialResponse(response) {
        const payload = parseJwt(response.credential);
        const res = await fetch('/api/auth/google', {
            method: 'POST', headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: payload.name,
                email: payload.email,
                googleId: payload.sub
            })
        });
        const data = await res.json();
        if (data.success) {
            localStorage.setItem('ga_user', JSON.stringify(data.user));
            window.location.href = '/';
        }
    }

    function parseJwt(token) {
        var base64Url = token.split('.')[1];
        var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
        var jsonPayload = decodeURIComponent(window.atob(base64).split('').map(function(c) {
            return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
        }).join(''));
        return JSON.parse(jsonPayload);
    }

    function switchTab(tab) {
        const isLogin = tab === 'login';
        document.getElementById('login-form').classList.toggle('hidden', !isLogin);
        document.getElementById('register-form').classList.toggle('hidden', isLogin);
        document.getElementById('tab-login').className = `flex-1 py-2 rounded-lg font-bold text-sm transition-all ${isLogin ? 'bg-cyan-500 text-black' : 'text-white/60'}`;
        document.getElementById('tab-register').className = `flex-1 py-2 rounded-lg font-bold text-sm transition-all ${!isLogin ? 'bg-purple-600 text-white' : 'text-white/60'}`;
    }

    function togglePass(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }

    function setLoading(btnId, loading) {
        const btn = document.getElementById(btnId);
        btn.disabled = loading;
        btn.textContent = loading ? 'Please wait...' : (btnId === 'login-btn' ? 'Sign In' : 'Create Account');
    }

    async function doLogin() {
        const email = document.getElementById('login-email').value.trim();
        const pass  = document.getElementById('login-pass').value;
        const errEl = document.getElementById('login-error');
        errEl.classList.add('hidden');
        if (!email || !pass) { errEl.textContent = 'Please fill all fields.'; errEl.classList.remove('hidden'); return; }
        setLoading('login-btn', true);
        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({ email, password: pass })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('ga_user', JSON.stringify(data.user));
                window.location.href = data.user.role === 'admin' ? 'admin' : '/';
            } else {
                errEl.textContent = data.message;
                errEl.classList.remove('hidden');
            }
        } catch(e) { errEl.textContent = 'Server error. Try again.'; errEl.classList.remove('hidden'); }
        setLoading('login-btn', false);
    }

    async function doRegister() {
        const name  = document.getElementById('reg-name').value.trim();
        const email = document.getElementById('reg-email').value.trim();
        const pass  = document.getElementById('reg-pass').value;
        const errEl = document.getElementById('reg-error');
        const sucEl = document.getElementById('reg-success');
        errEl.classList.add('hidden'); sucEl.classList.add('hidden');
        if (!name || !email || !pass) { errEl.textContent = 'All fields required.'; errEl.classList.remove('hidden'); return; }
        setLoading('reg-btn', true);
        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                credentials: 'include',
                body: JSON.stringify({ name, email, password: pass })
            });
            const data = await res.json();
            if (data.success) {
                localStorage.setItem('ga_user', JSON.stringify(data.user));
                sucEl.textContent = data.message + ' Redirecting...';
                sucEl.classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 1200);
            } else {
                errEl.textContent = data.message;
                errEl.classList.remove('hidden');
            }
        } catch(e) { errEl.textContent = 'Server error. Try again.'; errEl.classList.remove('hidden'); }
        setLoading('reg-btn', false);
    }

    // Enter key support
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') {
            if (!document.getElementById('login-form').classList.contains('hidden')) doLogin();
            else doRegister();
        }
    });
    </script>
</body>
</html>
