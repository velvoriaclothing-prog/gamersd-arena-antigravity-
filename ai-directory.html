<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMERS ARENA | AI Codex</title>
    <meta name="description" content="Explore the ultimate curated AI Codex featuring over 500+ top-tier AI tools.">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="cinematic.css">
    <style>
        .search-bar {
            width: 100%;
            max-width: 600px;
            padding: 1.5rem 2rem;
            border-radius: 50px;
            background: rgba(5, 5, 8, 0.7);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            font-size: 1.2rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }
        .search-bar:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
            background: rgba(10, 10, 15, 0.9);
        }
        .codex-tag {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent-blue);
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            border: 1px solid rgba(0, 242, 255, 0.3);
            display: inline-block;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-container" id="ga-logo">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/50/000/fff?text=GA'">
            <div>
                <div class="logo-text">GAMERS ARENA</div>
                <span class="logo-sub">PC GAMES ACCOUNTS STORE</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="library.html">FREE DROPS</a>
            <a href="premium.html">PREMIUM STORE</a>
            <a href="ai-directory.html" style="color: var(--accent-blue);" aria-current="page">AI CODEX</a>
        </div>
    </nav>

    <div class="hero-section" style="min-height: 50vh; align-items: center; justify-content: flex-end; padding-bottom: 4rem;">
        <h1 class="hero-title glowing-text" style="font-size: 4rem;" data-content="title">AI CODEX</h1>
        <p class="hero-subtitle" data-content="subtitle">500+ Curated Elite AI Tools Database</p>
        
        <div style="width: 100%; display: flex; justify-content: center; margin-top: 2rem;">
            <input type="text" id="ai-search" class="search-bar" placeholder="Search by name or category (e.g., Video, Music)..." oninput="filterTools()">
        </div>
    </div>

    <div class="section">
        <div class="grid" id="ai-tools-grid">
            <!-- Dynamic loading -->
            <div class="card-3d" style="min-height: 200px;"></div>
            <div class="card-3d" style="min-height: 200px;"></div>
            <div class="card-3d" style="min-height: 200px;"></div>
            <div class="card-3d" style="min-height: 200px;"></div>
        </div>
    </div>

    <footer>
        <div class="logo-text" style="font-size: 1.5rem; margin-bottom: 1rem;">GAMERS ARENA</div>
        <p style="color: var(--text-muted);">&copy; 2026 Gamers Arena. All rights reserved.</p>
    </footer>

    <script src="global.js"></script>
    <script>
        let allTools = [];

        async function loadTools() {
            try {
                const r = await fetch('ai-tools-data.json');
                const d = await r.json();
                allTools = d;
                renderTools(allTools);
            } catch (e) { 
                console.error("Failed to load Codex data", e);
                document.getElementById('ai-tools-grid').innerHTML = '<h3 style="color:var(--accent-red);text-align:center;width:100%;">Error loading Codex Database. Ensure ai-tools-data.json exists.</h3>';
            }
        }

        function renderTools(tools) {
            const grid = document.getElementById('ai-tools-grid');
            if (tools.length === 0) {
                grid.innerHTML = '<div style="text-align:center;width:100%;color:var(--text-muted);font-size:1.2rem;padding:3rem;">No AI tools match your query.</div>';
                return;
            }
            grid.innerHTML = tools.map(t => `
                <a href="${t.link}" target="_blank" class="card-3d" aria-label="Visit ${t.name}">
                    <div style="padding: 1.5rem; display: flex; flex-direction: column; height: 100%;">
                        <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                            <img src="${t.image || 'logo.png'}" alt="${t.name} Logo" style="width: 50px; height: 50px; border-radius: 12px; object-fit: cover; border: 1px solid var(--glass-border); margin-bottom: 1rem;" onerror="this.src='logo.png'">
                            <span class="codex-tag">${t.category || 'Tool'}</span>
                        </div>
                        <h3 class="card-title" style="font-size: 1.4rem;">${t.name}</h3>
                        <p class="card-desc" style="flex-grow: 1;">${t.description}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 1rem; border-top: 1px solid var(--glass-border); padding-top: 1rem;">
                            <span style="font-size: 0.8rem; color: var(--text-muted); font-weight: bold; letter-spacing: 2px; text-transform: uppercase;">Access Tool</span>
                            <span class="material-symbols-outlined" style="color: var(--accent-blue);">open_in_new</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }

        function filterTools() {
            const query = document.getElementById('ai-search').value.toLowerCase();
            const filtered = allTools.filter(t => 
                t.name.toLowerCase().includes(query) || 
                t.description.toLowerCase().includes(query) ||
                (t.category && t.category.toLowerCase().includes(query))
            );
            renderTools(filtered);
        }

        document.addEventListener('DOMContentLoaded', loadTools);
    </script>
</body>
</html>
