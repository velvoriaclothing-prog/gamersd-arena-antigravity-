<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Directory | Gamers Arena - 500+ Curated AI Tools</title>
    <link rel="canonical" href="https://gamersarena.shop/ai-directory.html" />
    <link rel="icon" type="image/png" href="https://gamersarena.shop/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .tool-card { transition: all 0.3s; }
        .tool-card:hover { border-color: #00f2ff; transform: translateY(-4px); box-shadow: 0 10px 30px -10px rgba(0, 242, 255, 0.2); }
        .search-bar { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .search-bar:focus { border-color: #00f2ff; outline: none; box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
    </style>
</head>
<body class="bg-black text-white min-h-screen relative z-0">
    <nav class="p-6 flex justify-between items-center border-b border-white/5 sticky top-0 bg-black/80 backdrop-blur-md z-50">
        <a href="index.html" class="text-2xl font-black italic tracking-tighter text-cyan-400">GAMERS ARENA</a>
        <div class="flex gap-6 text-sm font-bold uppercase tracking-widest text-white/50">
            <a href="index.html" class="hover:text-cyan-400">Store</a>
            <a href="free-games.html" class="hover:text-cyan-400">Free Reveals</a>
            <a href="premium-games.html" class="hover:text-cyan-400">Premium</a>
            <a href="ai-directory.html" class="text-cyan-400">AI Tools</a>
        </div>
    </nav>

    <header class="py-20 px-6 text-center">
        <h1 class="text-6xl font-black italic mb-4">AI DIRECTORY</h1>
        <p class="text-white/40 uppercase tracking-[0.3em] text-xs">Curated list of 500+ Powerful AI Tools</p>
        
        <div class="max-w-2xl mx-auto mt-12 relative">
            <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-white/30">search</span>
            <input type="text" id="ai-search" placeholder="Search AI tools by name, category, or feature..." 
                   class="search-bar w-full py-4 pl-12 pr-6 rounded-2xl text-lg transition-all" oninput="filterTools()">
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-40">
        <div id="ai-tools-grid" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">
            <!-- Tools will load here -->
            <div class="h-64 glass rounded-2xl animate-pulse"></div>
            <div class="h-64 glass rounded-2xl animate-pulse"></div>
            <div class="h-64 glass rounded-2xl animate-pulse"></div>
            <div class="h-64 glass rounded-2xl animate-pulse"></div>
        </div>
    </main>

    <script>
        let allTools = [];

        async function loadTools() {
            try {
                const r = await fetch('ai-tools-data.json');
                const d = await r.json();
                allTools = d;
                renderTools(allTools);
            } catch (e) { console.error(e); }
        }

        function renderTools(tools) {
            const grid = document.getElementById('ai-tools-grid');
            if (tools.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-20 text-white/30 uppercase tracking-widest">No tools found matching your search</div>';
                return;
            }
            grid.innerHTML = tools.map(t => `
                <a href="${t.link}" target="_blank" class="tool-card glass p-6 rounded-2xl flex flex-col group">
                    <div class="flex items-start justify-between mb-4">
                        <img src="${t.image || 'https://via.placeholder.com/64'}" alt="${t.name}" class="w-12 h-12 rounded-xl object-cover border border-white/10 group-hover:border-cyan-400/50 transition-colors" />
                        <span class="text-[10px] font-black uppercase bg-white/5 border border-white/10 px-2 py-1 rounded text-white/40">${t.category || 'Tool'}</span>
                    </div>
                    <h3 class="text-xl font-bold mb-2 group-hover:text-cyan-400 transition-colors">${t.name}</h3>
                    <p class="text-white/50 text-xs mb-6 line-clamp-3">${t.description}</p>
                    <div class="mt-auto flex items-center text-cyan-400 text-[10px] font-black uppercase tracking-widest">
                        Visit Site <span class="material-symbols-outlined text-sm ml-1 group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </div>
                </a>
            `).join('');
        }

        function filterTools() {
            const query = document.getElementById('ai-search').value.toLowerCase();
            const filtered = allTools.filter(t => 
                t.name.toLowerCase().includes(query) || 
                t.description.toLowerCase().includes(query) ||
                (t.category && t.category.toLowerCase().includes(query))
            );
            renderTools(filtered);
        }

        document.addEventListener('DOMContentLoaded', loadTools);
    </script>
    <script src="space-bg.js"></script>
</body>
</html>
