<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Verification | GAMERS ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="cinematic.css">
    <style>
        body { background: #050505; color: #fff; padding: 4rem; }
        .dashboard-grid { display: grid; gap: 2rem; }
        .request-card { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 2rem; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; }
        .status-badge { padding: 0.3rem 1rem; border-radius: 50px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: #ffd700; color: #000; }
        .status-approved { background: #00ff88; color: #000; }
        .status-rejected { background: #ff0055; color: #fff; }
    </style>
</head>
<body>
    <h1 class="glowing-text" style="margin-bottom: 3rem;">Payment Verifications</h1>
    
    <div id="requests-list" class="dashboard-grid">
        <p>Loading pending requests...</p>
    </div>

    <script>
        const pass = prompt("Enter Admin Password to access dashboard:");
        if (pass !== 'aditi0110') {
            alert("Unauthorized");
            window.location.href = 'index.html';
        }

        async function loadRequests() {
            const res = await fetch('/api/admin/payments');
            const data = await res.json();
            const list = document.getElementById('requests-list');
            list.innerHTML = '';

            // Map to check for duplicates in the current list
            const utrCounts = {};
            data.payments.forEach(p => utrCounts[p.utr_id] = (utrCounts[p.utr_id] || 0) + 1);

            data.payments.forEach(req => {
                const isDuplicate = utrCounts[req.utr_id] > 1;
                const div = document.createElement('div');
                div.className = 'request-card';
                if (isDuplicate) div.style.border = '1px solid var(--accent-red)';
                
                div.innerHTML = `
                    <div>
                        <div style="font-weight: 900; font-size: 1.2rem;">${req.user_email}</div>
                        <div style="color: var(--text-muted);">UTR: ${req.utr_id} ${isDuplicate ? '<span class="status-badge status-rejected" style="margin-left:10px;">DUPLICATE ALERT</span>' : ''}</div>
                        <div style="color: var(--accent-blue); font-size: 0.8rem; margin-top: 0.5rem;">PLAN: ${req.plan_name?.toUpperCase() || 'STARTER'}</div>
                        <div style="font-size: 0.8rem; margin-top: 0.2rem; opacity: 0.5;">${new Date(req.created_at).toLocaleString()}</div>
                    </div>
                    <div>
                        <span class="status-badge status-${req.status}">${req.status}</span>
                        ${req.status === 'pending' ? `
                            <select id="plan-${req.id}" class="admin-input" style="width: auto; margin: 0 1rem; padding: 0.3rem;">
                                <option value="starter" ${req.plan_name === 'starter' ? 'selected' : ''}>Starter (5)</option>
                                <option value="pro" ${req.plan_name === 'pro' ? 'selected' : ''}>Pro (12)</option>
                                <option value="ultimate" ${req.plan_name === 'ultimate' ? 'selected' : ''}>Ultimate (∞)</option>
                            </select>
                            <button onclick="processRequest(${req.id}, 'approved')" class="btn btn-primary" style="padding: 0.5rem 1rem;">Approve ${isDuplicate ? 'Anyway' : ''}</button>
                            <button onclick="processRequest(${req.id}, 'rejected')" class="btn btn-danger" style="padding: 0.5rem 1rem; margin-left: 0.5rem;">Reject</button>
                        ` : ''}
                    </div>
                `;
                list.appendChild(div);
            });
        }

        async function processRequest(requestId, status) {
            let plan = 'starter';
            if (status === 'approved') {
                plan = document.getElementById(`plan-${requestId}`).value;
            }

            const res = await fetch('/api/admin/payments/process', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ id: 'admin', pass: 'aditi0110', requestId, status, plan })
            });
            if ((await res.json()).success) {
                alert(`Request ${status}!`);
                loadRequests();
            }
        }

        loadRequests();
    </script>
</body>
</html>
