<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMERS ARENA | Admin Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="cinematic.css">
    <style>
        .admin-layout { display: flex; min-height: 100vh; padding-top: 80px; }
        .sidebar { width: 250px; background: rgba(5,5,8,0.9); border-right: 1px solid var(--glass-border); padding: 2rem; position: fixed; height: 100%; }
        .admin-content { margin-left: 250px; padding: 3rem; flex: 1; }
        .sidebar-btn { display: flex; align-items: center; gap: 1rem; width: 100%; padding: 1rem; background: transparent; color: var(--text-main); border: none; text-align: left; cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: bold; margin-bottom: 0.5rem; }
        .sidebar-btn:hover, .sidebar-btn.active { background: var(--accent-blue-dim); color: var(--accent-blue); }
        .dashboard-panel { display: none; }
        .dashboard-panel.active { display: block; }
        table { width: 100%; border-collapse: collapse; margin-top: 2rem; background: var(--bg-card); border-radius: 12px; overflow: hidden; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid var(--glass-border); }
        th { background: rgba(0,0,0,0.5); color: var(--accent-blue); text-transform: uppercase; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar" style="padding: 1rem 2rem;">
        <div class="logo-container">
            <div class="logo-text" style="color: var(--accent-red);">ADMIN TERMINAL</div>
        </div>
        <a href="index.html" class="btn btn-secondary" style="padding: 0.5rem 1rem;">Exit Admin</a>
    </nav>

    <div class="admin-layout">
        <div class="sidebar">
            <button class="sidebar-btn active" onclick="switchTab('drops')">
                <span class="material-symbols-outlined">library_add</span> Free Drops
            </button>
            <button class="sidebar-btn" onclick="switchTab('bundles')">
                <span class="material-symbols-outlined">workspace_premium</span> Premium Bundles
            </button>
        </div>

        <div class="admin-content">
            <div id="panel-drops" class="dashboard-panel active">
                <h1 style="font-size: 2.5rem; font-weight: 900;">Manage Free Drops</h1>
                <p style="color: var(--text-muted);">View and manage the games and accounts database.</p>
                <div style="margin-top: 2rem; background: rgba(0,0,0,0.5); padding: 1.5rem; border-radius: 8px;">
                    <h3>Add New Game Account</h3>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                        <input type="text" id="new-game-title" class="admin-input" placeholder="Game Title">
                        <input type="text" id="new-game-user" class="admin-input" placeholder="Username">
                        <input type="text" id="new-game-pass" class="admin-input" placeholder="Password">
                        <button class="btn btn-primary" onclick="addGame()">+ Add</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>ID</th><th>Game Name</th><th>Action</th></tr></thead>
                    <tbody id="admin-games-list">
                        <tr><td colspan="3">Loading...</td></tr>
                    </tbody>
                </table>
            </div>

            <div id="panel-bundles" class="dashboard-panel">
                <h1 style="font-size: 2.5rem; font-weight: 900;">Premium Bundles</h1>
                <p style="color: var(--text-muted);">Manage the bundles displayed in the Premium Store.</p>
                <div style="margin-top: 2rem; background: rgba(0,0,0,0.5); padding: 1.5rem; border-radius: 8px;">
                    <h3>Create Premium Bundle</h3>
                    <div style="display: flex; gap: 1rem; margin-top: 1rem; flex-wrap: wrap;">
                        <input type="text" id="new-bundle-name" class="admin-input" placeholder="Bundle Name">
                        <input type="text" id="new-bundle-price" class="admin-input" placeholder="Price (e.g. ₹1999)">
                        <input type="text" id="new-bundle-desc" class="admin-input" placeholder="Description" style="flex: 1 1 100%;">
                        <button class="btn btn-primary" onclick="addBundle()">+ Create</button>
                    </div>
                </div>
                <table>
                    <thead><tr><th>ID</th><th>Bundle Name</th><th>Price</th><th>Action</th></tr></thead>
                    <tbody id="admin-bundles-list">
                        <tr><td colspan="4">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3000';
        const CREDS = { id: 'admin', pass: 'aditi0110' };

        function switchTab(tabId) {
            document.querySelectorAll('.dashboard-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('panel-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // LOAD DATA
        function loadAdminData() {
            fetch(API_URL + '/api/games').then(r=>r.json()).then(data => {
                const tbody = document.getElementById('admin-games-list');
                tbody.innerHTML = data.games.map(g => `
                    <tr><td>${g.id}</td><td>${g.game || g.name}</td>
                    <td><button class="btn-secondary" style="padding: 0.5rem;" onclick="deleteGame('${g.id}')">Delete</button></td></tr>
                `).join('');
            });

            fetch(API_URL + '/api/premium').then(r=>r.json()).then(data => {
                const tbody = document.getElementById('admin-bundles-list');
                tbody.innerHTML = data.bundles.map(b => `
                    <tr><td>${b.id}</td><td>${b.name}</td><td>${b.price}</td>
                    <td><button class="btn-secondary" style="padding: 0.5rem;" onclick="deleteBundle('${b.id}')">Delete</button></td></tr>
                `).join('');
            });
        }
        loadAdminData();

        // ADD GAME
        function addGame() {
            const gameData = {
                game: document.getElementById('new-game-title').value,
                username: document.getElementById('new-game-user').value,
                password: document.getElementById('new-game-pass').value
            };
            fetch(API_URL + '/api/admin/games', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...CREDS, gameData })
            }).then(() => { alert("Added!"); loadAdminData(); });
        }

        // DELETE GAME
        function deleteGame(gameId) {
            fetch(API_URL + '/api/admin/games/delete', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...CREDS, gameId })
            }).then(() => loadAdminData());
        }

        // ADD BUNDLE
        function addBundle() {
            const bundleData = {
                name: document.getElementById('new-bundle-name').value,
                price: document.getElementById('new-bundle-price').value,
                desc: document.getElementById('new-bundle-desc').value
            };
            fetch(API_URL + '/api/admin/premium', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...CREDS, bundleData })
            }).then(() => { alert("Created!"); loadAdminData(); });
        }

        // DELETE BUNDLE
        function deleteBundle(bundleId) {
            fetch(API_URL + '/api/admin/premium/delete', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ ...CREDS, bundleId })
            }).then(() => loadAdminData());
        }
    </script>
</body>
</html>
