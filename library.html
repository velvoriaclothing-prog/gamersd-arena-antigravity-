<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account library | GAMERS ARENA</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Logo" class="logo-icon" onerror="this.src='https://via.placeholder.com/40/000/fff?text=GA'">
            <div>
                <div class="logo-text">GAMERS ARENA</div>
                <div class="logo-sub">FREE TO USE</div>
            </div>
        </a>
        <button class="nav-menu-btn"><span class="material-symbols-outlined">menu</span></button>
    </nav>

    <div class="container">
        <div class="lib-header">
            <span class="lib-badge">BROWSE</span>
            <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem;">Account library</h1>
            <p style="color: var(--text-muted); max-width: 600px;">Search and filter curated drops across games and apps. Open listing credentials and community notes.</p>
        </div>

        <div class="search-bar-container">
            <span class="material-symbols-outlined" style="color: var(--text-muted); margin: 0.8rem;">search</span>
            <input type="text" class="search-input" id="search" placeholder="Search games, apps, or descriptions...">
            <select style="background: transparent; border: none; color: var(--text-main); outline: none; margin-right: 1rem; cursor: pointer;">
                <option value="all">All Services</option>
                <option value="steam">Steam</option>
                <option value="epic">Epic</option>
            </select>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            <span style="font-weight: bold; color: var(--text-main);" id="listing-count">Loading listings...</span>
            <span>Select a card to view details</span>
        </div>

        <div class="card-grid" id="games-grid">
            <!-- Loading Skeletons -->
            <div class="game-card" style="height: 300px; opacity: 0.5;"></div>
            <div class="game-card" style="height: 300px; opacity: 0.5;"></div>
            <div class="game-card" style="height: 300px; opacity: 0.5;"></div>
        </div>
    </div>

    <script>
        fetch('http://localhost:3000/api/games')
            .then(res => res.json())
            .then(data => {
                if(data.success && data.games) renderGames(data.games);
            })
            .catch(() => {
                // Fallback demo data
                renderGames([
                    {id: 1, game: 'Prime Video', desc: '5x Prime Video...', user: 'Emojiman', date: 'May 6, 2026, 08:52 PM'},
                    {id: 2, game: '57 Crunchyroll', desc: 'Enjoy...', user: 'Emojiman', date: 'May 6, 2026, 08:50 PM'},
                    {id: 3, game: '140 XBOX ACCOUNTS', desc: 'enjoy and vouch me...', user: 'Emojiman', date: 'May 6, 2026, 08:46 PM'},
                    {id: 4, game: 'GTA STEAM FRESH', desc: 'By emojiman..', user: 'Emojiman', date: 'May 6, 2026, 08:25 PM'}
                ]);
            });

        function renderGames(games) {
            document.getElementById('listing-count').innerText = games.length + ' listings';
            const grid = document.getElementById('games-grid');
            grid.innerHTML = games.map((g, i) => {
                const gradients = [
                    'linear-gradient(135deg, #3b82f6, #06b6d4)',
                    'linear-gradient(135deg, #8b5cf6, #3b82f6)',
                    'linear-gradient(135deg, #10b981, #3b82f6)'
                ];
                const bg = gradients[i % gradients.length];
                
                return `
                <a href="game.html?id=${g.id}" class="game-card">
                    <div class="card-top" style="background: ${bg};">
                        <div class="platform-badge"><span class="material-symbols-outlined" style="font-size:14px;">check_circle</span> Verified</div>
                        ${g.image ? `<img src="${g.image}" onerror="this.style.display='none'" alt="Cover">` : ''}
                    </div>
                    <div class="card-bottom">
                        <h3>${g.game || g.name}</h3>
                        <p>${g.desc || 'Click to view details & get account →'}</p>
                        <div class="card-meta">
                            <span style="display:flex; align-items:center; gap:0.3rem;"><span class="material-symbols-outlined" style="font-size:14px;">person</span> admin</span>
                            <span style="display:flex; align-items:center; gap:0.3rem;"><span class="material-symbols-outlined" style="font-size:14px;">calendar_today</span> Today</span>
                        </div>
                    </div>
                </a>
            `}).join('');
        }
    </script>
</body>
</html>
