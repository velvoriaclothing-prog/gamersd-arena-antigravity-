<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#030305">
    
    <title>Free PC Games Drops Vault | Gamers Arena</title>
    <meta name="description" content="Browse our massive library of over 290 free shared PC game accounts. Find your favorite AAA titles and wait for the 30-second unlock to get instant access.">
    <meta name="keywords" content="free PC games, shared game accounts, play GTA V free, free Steam accounts library, Gamers Arena drops">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://gamersarena.com/library.html">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="cinematic.css">
</head>
<body>
    <nav class="navbar" aria-label="Main Navigation">
        <a href="index.html" class="logo-container" id="ga-logo" aria-label="Gamers Arena Home">
            <img src="logo.png" alt="Gamers Arena Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/50/000/fff?text=GA'" width="50" height="50">
            <div>
                <div class="logo-text">GAMERS ARENA</div>
                <span class="logo-sub">PC GAMES ACCOUNTS STORE</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="index.html">HOME</a>
            <a href="library.html" style="color: var(--accent-blue);" aria-current="page">FREE DROPS</a>
            <a href="premium.html">PREMIUM STORE</a>
        </div>
    </nav>

    <main>
        <section class="section" style="padding-top: 12rem;">
            <div class="section-header">
                <div class="section-subtitle">The Vault</div>
                <h1 class="section-title glowing-text">Free Drops Library</h1>
                <p style="color: var(--text-muted); font-size: 1.2rem;">Browse 296+ high-tier PC game accounts. Select a card to initiate the 30-second decryption sequence.</p>
            </div>

            <form class="search-box" role="search" onsubmit="event.preventDefault();">
                <label for="search" class="visually-hidden" style="display:none;">Search Games</label>
                <input type="text" id="search" class="search-input" placeholder="Search games, genres, or keywords..." aria-label="Search games">
                <button type="submit" class="btn btn-primary" style="border-radius: 50px;" aria-label="Execute Search"><span class="material-symbols-outlined" aria-hidden="true">search</span></button>
            </form>

            <div class="grid" id="games-grid" aria-live="polite">
                <!-- Dynamically populated via JS -->
                <div style="text-align: center; color: var(--text-muted); grid-column: 1/-1;">Loading secure games database...</div>
            </div>
        </section>
    </main>

    <footer style="text-align: center; padding: 3rem; border-top: 1px solid var(--glass-border); background: var(--bg-dark); color: var(--text-muted);">
        <p>&copy; 2026 Gamers Arena. All rights reserved.</p>
    </footer>

    <script src="global.js" defer></script>
    <script>
        fetch('http://localhost:3000/api/games')
            .then(res => res.json())
            .then(data => {
                if(data.success && data.games) renderGames(data.games);
                else throw new Error("Fallback required");
            })
            .catch(() => {
                renderGames([
                    {id: 1, name: 'Grand Theft Auto V Legacy', genre: 'Open World', image: 'logo.png'},
                    {id: 2, name: 'Cyberpunk 2077', genre: 'RPG', image: 'logo.png'},
                    {id: 3, name: 'Elden Ring', genre: 'Action', image: 'logo.png'}
                ]);
            });

        function renderGames(games) {
            const grid = document.getElementById('games-grid');
            grid.innerHTML = games.map(g => `
                <a href="game.html?id=${g.id}" class="card-3d" aria-label="Unlock ${g.game || g.name}">
                    <div class="card-image-wrapper">
                        <img src="${g.image || 'logo.png'}" alt="Cover image of ${g.game || g.name}" loading="lazy" onerror="this.src='logo.png'">
                    </div>
                    <div class="card-content">
                        <h2 class="card-title">${g.game || g.name}</h2>
                        <p class="card-desc" style="color: var(--accent-red);">${g.genre || 'PC Game'}</p>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto;">
                            <span style="font-size: 0.9rem; color: var(--text-muted);">Initiate Unlock</span>
                            <span class="material-symbols-outlined" style="color: var(--accent-blue);" aria-hidden="true">lock_open</span>
                        </div>
                    </div>
                </a>
            `).join('');
        }
    </script>
</body>
</html>
