<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Library | Browse 700+ PC Game Drops | Gamers Arena</title>
    <meta name="description" content="Explore our massive library of premium shared PC game accounts. Search for your favorite AAA titles and get instant access to verified drops.">
    <meta property="og:title" content="Gamers Arena Library | 700+ Verified Game Drops">
    <meta property="og:description" content="Search and browse our elite collection of shared gaming accounts. Ready to play?">
    <meta property="og:image" content="https://gamersd-arena-antigravity.onrender.com/logo.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="aura.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-container">
            <img src="logo.png" alt="Logo" class="logo-icon" onerror="this.src='https://via.placeholder.com/40/000/fff?text=GA'">
            <div>
                <div class="logo-text">GAMERS ARENA</div>
                <div class="logo-sub">FREE TO USE</div>
            </div>
        </a>
        <button class="nav-menu-btn"><span class="material-symbols-outlined">menu</span></button>
    </nav>

    <div class="container">
        <div class="lib-header">
            <span class="lib-badge" data-content="badge">BROWSE</span>
            <h1 style="font-size: 2.5rem; font-weight: 900; margin-bottom: 1rem;" data-content="title">Account library</h1>
            <p style="color: var(--text-muted); max-width: 600px;" data-content="desc">Search and filter curated drops across games and apps. Open listing credentials and community notes.</p>
        </div>

        <div class="search-bar-container">
            <span class="material-symbols-outlined" style="color: var(--text-muted); margin: 0.8rem;">search</span>
            <input type="text" class="search-input" id="search" placeholder="Search games, apps, or descriptions...">
            <select style="background: transparent; border: none; color: var(--text-main); outline: none; margin-right: 1rem; cursor: pointer;">
                <option value="all">All Services</option>
                <option value="steam">Steam</option>
                <option value="epic">Epic</option>
            </select>
        </div>

        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; color: var(--text-muted); font-size: 0.9rem;">
            <span style="font-weight: bold; color: var(--text-main);" id="listing-count">Loading listings...</span>
            <span>Select a card to view details</span>
        </div>

        <div class="card-grid" id="games-grid">
            <!-- Loading Skeletons -->
            <div class="game-card" style="height: 300px; opacity: 0.5;"></div>
            <div class="game-card" style="height: 300px; opacity: 0.5;"></div>
            <div class="game-card" style="height: 300px; opacity: 0.5;"></div>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        let allGames = [];
        fetch('/api/games')
            .then(res => res.json())
            .then(data => {
                if(data.success && data.games) {
                    allGames = data.games;
                    renderGames(allGames);
                }
            });

        function renderGames(games) {
            // SORTING: Multi-game accounts on top
            const sortedGames = [...games].sort((a, b) => (b.game_total || 0) - (a.game_total || 0));
            
            document.getElementById('listing-count').innerText = sortedGames.length + ' listings';
            const grid = document.getElementById('games-grid');
            if (sortedGames.length === 0) {
                grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted);">No accounts found matching your search.</div>';
                return;
            }
            grid.innerHTML = sortedGames.map((g, i) => {
                const gradients = ['linear-gradient(135deg, #3b82f6, #06b6d4)', 'linear-gradient(135deg, #8b5cf6, #3b82f6)', 'linear-gradient(135deg, #10b981, #3b82f6)'];
                const bg = gradients[i % gradients.length];
                const isMega = (g.game_total || 0) >= 25;
                const hasMultiple = (g.game_total || 0) > 1;
                
                return `
                <a href="game.html?id=${g.id}" class="game-card">
                    <div class="card-top" style="background: ${bg};">
                        <div class="platform-badge"><span class="material-symbols-outlined" style="font-size:14px;">check_circle</span> Verified</div>
                        ${isMega ? '<div style="position:absolute; top:10px; right:10px; background:gold; color:#000; padding:2px 8px; border-radius:50px; font-size:10px; font-weight:900; box-shadow:0 0 15px gold;">MEGA ACCOUNT</div>' : ''}
                        ${hasMultiple ? `<div style="position:absolute; bottom:10px; left:10px; background:rgba(0,0,0,0.8); border:1px solid #00ff88; color:#00ff88; padding:2px 8px; border-radius:4px; font-size:10px; font-weight:bold;">${g.game_total} GAMES</div>` : ''}
                        ${g.image ? `<img src="${g.image}" onerror="this.style.display='none'" alt="Cover">` : ''}
                    </div>
                    <div class="card-bottom">
                        <h3>${g.game || g.name}</h3>
                        <p>${g.desc || 'Multi-game premium account with instant access →'}</p>
                        <div class="card-meta">
                            <span style="display:flex; align-items:center; gap:0.3rem;"><span class="material-symbols-outlined" style="font-size:14px;">person</span> admin</span>
                            <span style="display:flex; align-items:center; gap:0.3rem;"><span class="material-symbols-outlined" style="font-size:14px;">calendar_today</span> Today</span>
                        </div>
                    </div>
                </a>`;
            }).join('');
        }

        // Search logic
        document.getElementById('search').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = allGames.filter(g => 
                (g.game && g.game.toLowerCase().includes(query)) || 
                (g.name && g.name.toLowerCase().includes(query)) ||
                (g.desc && g.desc.toLowerCase().includes(query))
            );
            renderGames(filtered);
        });
    </script>
</body>
</html>
