<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Gamers Arena | Blogs & News</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary-container": "#00f2ff",
                        "on-primary-fixed": "#002022",
                        "secondary-container": "#b600f8",
                        "secondary-fixed": "#f8d8ff",
                    },
                    fontFamily: {
                        "body-md": ["Inter"],
                        "headline-md": ["Inter"],
                        "headline-lg": ["Inter"],
                        "display-xl": ["Inter"],
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #050505; color: #e5e2e1; }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .neon-glow-cyan { box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .neon-glow-purple { box-shadow: 0 0 15px rgba(182, 0, 248, 0.3); }
    </style>
    <script src="cart-logic.js"></script>
</head>
<body class="bg-black text-white font-body-md relative min-h-screen flex flex-col z-0">
    <!-- space-bg.js will handle the star background -->
    
    <!-- TopNavBar -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,0.5)]">
        <div class="flex justify-between items-center w-full px-6 py-4 max-w-[1440px] mx-auto">
            <div class="text-2xl font-black uppercase tracking-widest text-cyan-400 drop-shadow-[0_0_10px_rgba(0,242,255,0.5)]">
                Gamers Arena
            </div>
            <nav class="hidden md:flex items-center gap-8 font-inter tracking-tight">
                <a class="text-white/70 hover:text-white hover:text-cyan-400 transition-colors duration-300" href="index.html">Home</a>
                <a class="text-white/70 hover:text-white hover:text-cyan-400 transition-colors duration-300" href="free-games.html">Free Reveals</a>
                <a class="text-white/70 hover:text-white hover:text-cyan-400 transition-colors duration-300" href="premium-games.html">Premium</a>
                <a class="text-white/70 hover:text-white hover:text-cyan-400 transition-colors duration-300" href="ai-directory.html">AI Tools</a>
                <a class="text-cyan-400 border-b-2 border-cyan-400 pb-1 hover:text-cyan-400 transition-colors duration-300" href="blog.html">Daily Intel</a>
            </nav>
            <div class="flex items-center gap-6">
                <div class="flex items-center gap-4 text-white/70">
                    <a href="cart.html" class="relative group cursor-pointer text-white/70 hover:text-cyan-400 transition-colors duration-300">
                        <span class="material-symbols-outlined" data-icon="shopping_cart">shopping_cart</span>
                        <span id="cart-badge" class="absolute -top-2 -right-2 bg-purple-500 text-white text-[10px] font-bold rounded-full w-4 h-4 flex items-center justify-center hidden shadow-[0_0_10px_purple]">0</span>
                    </a>
                </div>
                <button class="auth-btn bg-primary-container text-on-primary-fixed font-bold px-6 py-2 rounded-lg active:scale-95 transition-transform hover:shadow-[0_0_15px_rgba(0,242,255,0.5)]">
                    Sign In
                </button>
            </div>
        </div>
    </header>

    <main class="pt-32 pb-16 flex-1 max-w-[1440px] mx-auto px-6 w-full">
        <div class="flex items-center justify-between border-l-4 border-purple-500 pl-4 mb-12">
            <h1 class="font-display-xl text-5xl text-white uppercase italic tracking-tight">AI Daily Intel</h1>
            <span class="text-purple-400 font-label-caps tracking-widest">LATEST NEWS & BLOGS</span>
        </div>

        <div id="featured-blog"></div>
<div id="blogs-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    </main>

    <footer class="bg-neutral-950 mt-auto border-t border-white/5 py-12">
        <div class="max-w-[1440px] mx-auto px-6 flex flex-col md:flex-row justify-between items-center gap-8">
            <div class="text-lg font-bold text-white uppercase tracking-widest">Gamers Arena</div>
            <p class="font-inter text-xs uppercase tracking-widest text-neutral-500">© 2024 GAMERS ARENA. ELITE PERFORMANCE INTERFACE.</p>
        </div>
    </footer>
<script>
    async function loadBlogs() {
        try {
            const r = await fetch('/api/blogs/all');
            const d = await r.json();
            if(!d.success || !d.blogs.length) return;

            const featured = d.blogs[0];
            const others = d.blogs.slice(1);

            document.getElementById('featured-blog').innerHTML = `
                <div class="glass-card rounded-xl overflow-hidden mb-12 relative group cursor-pointer border-purple-500/20 hover:border-purple-500/50 transition-colors">
                    <div class="md:h-[400px] w-full relative">
                        <img src="${featured.image || 'https://images.unsplash.com/photo-1620641788421-7a1c342ea42e?auto=format&fit=crop&w=1600&q=80'}" class="w-full h-full object-cover opacity-60 group-hover:opacity-80 transition-opacity duration-700" alt="AI Gaming Hardware">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/50 to-transparent"></div>
                        <div class="absolute bottom-0 p-8 w-full">
                            <span class="bg-purple-500/20 border border-purple-400 text-purple-400 px-3 py-1 text-xs font-bold rounded-full mb-4 inline-block">FEATURED</span>
                            <h2 class="text-4xl font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors">${featured.title}</h2>
                            <p class="text-white/70 max-w-3xl mb-4 line-clamp-2">${featured.content.substring(0, 200)}...</p>
                            <span class="text-cyan-400 text-sm font-bold flex items-center gap-1 group-hover:translate-x-2 transition-transform">Read Intel <span class="material-symbols-outlined text-sm">arrow_forward</span></span>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('blogs-grid').innerHTML = others.map(b => `
                <div class="glass-card rounded-xl overflow-hidden border-white/10 hover:border-cyan-400/40 transition-colors group cursor-pointer flex flex-col">
                    <div class="h-48 overflow-hidden relative">
                        <img src="${b.image || 'https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=800&q=80'}" class="w-full h-full object-cover opacity-70 group-hover:scale-105 transition-transform duration-700" alt="Esports">
                        <div class="absolute top-4 left-4 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-xs text-white border border-white/10">${b.category || 'General'}</div>
                    </div>
                    <div class="p-6 flex flex-col flex-1">
                        <h3 class="text-xl font-bold text-white mb-2 group-hover:text-cyan-400 transition-colors">${b.title}</h3>
                        <p class="text-white/60 text-sm mb-4 line-clamp-3 flex-1">${b.content.substring(0, 150)}...</p>
                        <div class="flex justify-between items-center text-xs text-white/40 pt-4 border-t border-white/10">
                            <span>${new Date(b.created_at).toLocaleDateString()}</span>
                            <span>${b.read_time} Min Read</span>
                        </div>
                    </div>
                </div>
            `).join('');
        } catch(e) { console.error(e); }
    }
    document.addEventListener('DOMContentLoaded', loadBlogs);
</script>
    <script src="space-bg.js"></script>
</body>
</html>
