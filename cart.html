<!DOCTYPE html>
<html class="dark" lang="en"><head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Gamers Arena | Cart</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
body{background:#050505;color:#e5e2e1;font-family:'Inter',sans-serif}
.glass{background:rgba(255,255,255,.05);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.08)}
@keyframes fadeInUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
</style>
<script src="cart-logic.js"></script>
</head>
<body class="bg-black text-white min-h-screen flex flex-col z-0">
<script src="space-bg.js"></script>
<header class="fixed top-0 left-0 right-0 z-50 bg-black/80 backdrop-blur-md border-b border-white/10 shadow-[0_4px_30px_rgba(0,0,0,.5)]">
<div class="flex justify-between items-center w-full px-6 py-4 max-w-[1440px] mx-auto">
<a href="index.html" class="text-2xl font-black uppercase tracking-widest text-cyan-400 drop-shadow-[0_0_10px_rgba(0,242,255,.5)]">Gamers Arena</a>
<nav class="hidden md:flex items-center gap-8 text-sm">
<a class="text-white/70 hover:text-cyan-400 transition-colors" href="index.html">Home</a>
<a class="text-white/70 hover:text-cyan-400 transition-colors" href="free-games.html">Free Reveals</a>
<a class="text-white/70 hover:text-cyan-400 transition-colors" href="premium-games.html">Premium</a>
<a class="text-white/70 hover:text-cyan-400 transition-colors" href="ai-directory.html">AI Tools</a>
<a class="text-white/70 hover:text-cyan-400 transition-colors" href="blog.html">Daily Intel</a>
</nav>
<button class="auth-btn bg-cyan-500 text-black font-bold px-5 py-2 rounded-lg text-sm">Sign In</button>
</div>
</header>

<main class="pt-28 pb-16 flex-1 max-w-[1000px] w-full mx-auto px-6">
<h1 class="text-3xl font-black text-white uppercase mb-8 border-l-4 border-cyan-400 pl-4">Your Cart</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-8">
<div class="md:col-span-2 space-y-4" id="cart-items"></div>
<div class="glass rounded-xl p-6 h-fit sticky top-28">
<h3 class="text-xl font-bold text-white mb-4 border-b border-white/10 pb-4">Order Summary</h3>
<div class="flex justify-between items-center mb-4">
<span class="text-white/70">Total</span>
<span class="text-2xl font-bold text-cyan-400" id="cart-total">₹0</span>
</div>
<button id="pay-btn" onclick="startCheckout()" class="w-full bg-purple-600 text-white py-3 rounded-lg font-bold hover:shadow-[0_0_15px_rgba(182,0,248,.5)] transition-all hidden text-sm">Proceed to Pay</button>
<div id="qr-flow" class="hidden mt-4 flex flex-col items-center text-center space-y-4" style="animation:fadeInUp .4s ease">
<p class="text-cyan-400 font-bold text-sm">Scan QR to Pay via UPI</p>
<div class="bg-white p-3 rounded-xl shadow-[0_0_30px_rgba(0,242,255,.3)]">
<img src="qr-payment.png" alt="Payment QR" class="w-[200px] h-[200px] object-contain"/>
</div>
<p class="text-white/40 text-xs">After payment, click "I Paid" below</p>
<button onclick="claimPayment()" class="w-full bg-green-500 text-black py-3 rounded-lg font-bold text-sm flex justify-center items-center gap-2 hover:shadow-[0_0_15px_rgba(0,255,0,.4)] transition-all">
<span class="material-symbols-outlined text-lg">check_circle</span> I Paid — Go to Telegram
</button>
</div>
</div>
</div>
</main>

<footer class="bg-neutral-950 mt-auto border-t border-white/5 py-8 text-center">
<p class="text-xs text-neutral-500 uppercase tracking-widest">© 2024 Gamers Arena</p>
</footer>

<script>
let currentOrderId = null;
function renderCart() {
    const cart = getCart();
    const c = document.getElementById('cart-items');
    const total = document.getElementById('cart-total');
    const payBtn = document.getElementById('pay-btn');
    document.getElementById('qr-flow').classList.add('hidden');
    if (!cart.length) {
        c.innerHTML = '<div class="text-white/40 p-8 text-center border border-dashed border-white/20 rounded-xl">Cart is empty. <a href="index.html" class="text-cyan-400 hover:underline">Browse Store</a></div>';
        total.textContent = '₹0'; payBtn.classList.add('hidden'); return;
    }
    let sum = 0;
    c.innerHTML = cart.map((item, i) => {
        const p = parseFloat(item.price.replace('₹','').replace(',',''));
        sum += p;
        return `<div class="glass rounded-xl p-4 flex gap-4 items-center" style="animation:fadeInUp .3s ease ${i*0.1}s both"><img src="${item.image}" class="w-20 h-20 object-cover rounded-lg"/><div class="flex-1"><h4 class="text-white font-bold text-sm">${item.name}</h4><p class="text-cyan-400 font-bold">₹${p.toLocaleString('en-IN')}</p></div><button onclick="removeItem(${i})" class="text-white/30 hover:text-red-400 transition"><span class="material-symbols-outlined">delete</span></button></div>`;
    }).join('');
    total.textContent = '₹' + sum.toLocaleString('en-IN');
    payBtn.classList.remove('hidden');
}
function removeItem(i) { const c = getCart(); c.splice(i,1); saveCart(c); renderCart(); }

async function startCheckout() {
    const user = getUser();
    if (!user) { window.location.href = 'login.html'; return; }
    const cart = getCart();
    let sum = 0; cart.forEach(i => sum += parseFloat(i.price.replace('₹','').replace(',','')));
    try {
        const r = await fetch('/api/orders/create', {
            method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include',
            body: JSON.stringify({ items: cart, total: sum })
        });
        const d = await r.json();
        if (d.success) { currentOrderId = d.order.id; document.getElementById('pay-btn').classList.add('hidden'); document.getElementById('qr-flow').classList.remove('hidden'); }
        else alert(d.message);
    } catch(e) { alert('Error creating order'); }
}

async function claimPayment() {
    if (!currentOrderId) { window.open('https://t.me/gamersarena_shop','_blank'); return; }
    try {
        const r = await fetch('/api/orders/claim-payment/'+currentOrderId, {
            method: 'POST', headers: {'Content-Type':'application/json'}, credentials: 'include'
        });
        const d = await r.json();
        localStorage.removeItem('gamersArenaCart'); updateCartBadge();
        window.open('https://t.me/gamersarena_shop','_blank');
        renderCart();
    } catch(e) { window.open('https://t.me/gamersarena_shop','_blank'); }
}

document.addEventListener('DOMContentLoaded', renderCart);
</script>
</body></html>
