<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAMERS ARENA | Checkout</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet">
    <link rel="stylesheet" href="cinematic.css">
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo-container" id="ga-logo">
            <img src="logo.png" alt="Logo" class="logo-img" onerror="this.src='https://via.placeholder.com/50/000/fff?text=GA'">
            <div>
                <div class="logo-text">GAMERS ARENA</div>
                <span class="logo-sub">PC GAMES ACCOUNTS STORE</span>
            </div>
        </a>
        <div class="nav-links">
            <a href="premium.html">← BACK TO STORE</a>
        </div>
    </nav>

    <div class="cart-wrapper">
        <img src="logo.png" id="cart-img" class="cart-img" alt="Bundle Image" onerror="this.src='logo.png'">
        <div class="cart-info">
            <div class="section-subtitle">SECURE CHECKOUT</div>
            <h1 id="cart-title" style="font-size: 2.5rem; font-weight: 900; margin: 1rem 0;">Loading Bundle...</h1>
            <div id="cart-price" style="font-size: 3rem; font-weight: 900; color: var(--accent-blue); margin-bottom: 2rem;">$0.00</div>
            
            <p style="color: var(--text-muted); margin-bottom: 2rem;">All premium transactions and support are handled securely via Telegram to ensure direct and fast service.</p>

            <div class="cart-actions">
                <a href="#" id="btn-buy" class="btn btn-primary" style="justify-content: center;">
                    Confirm to Buy <span class="material-symbols-outlined">send</span>
                </a>
                <a href="#" id="btn-support" class="btn btn-secondary" style="justify-content: center;">
                    Chat on Telegram <span class="material-symbols-outlined">support_agent</span>
                </a>
            </div>
        </div>
    </div>

    <script src="global.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const bundleName = urlParams.get('bundle') || 'Unknown Bundle';
        const bundlePrice = urlParams.get('price') || 'TBD';
        
        document.getElementById('cart-title').innerText = bundleName;
        document.getElementById('cart-price').innerText = bundlePrice;

        const telegramLink = "https://t.me/gamersarena_shop"; // Change this to your real telegram link
        
        // Setup Telegram routing messages
        const buyMsg = \`Hello! I want to buy this game: \${bundleName} for \${bundlePrice}. Please proceed further for purchase.\`;
        const supportMsg = \`Hello! I need help and details for this purchase. Bundle: \${bundleName}, Price: \${bundlePrice}.\`;

        document.getElementById('btn-buy').href = \`\${telegramLink}?text=\${encodeURIComponent(buyMsg)}\`;
        document.getElementById('btn-support').href = \`\${telegramLink}?text=\${encodeURIComponent(supportMsg)}\`;
    </script>
</body>
</html>
